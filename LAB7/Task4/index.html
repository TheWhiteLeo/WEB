<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
  <!--
  Завдання 4: Валідація форми та події Створіть HTML-форму з трьома полями: first_name, last_name, email.
  При натисканні на кнопку submit перевірте, чи всі поля заповнені.
  Якщо хоча б одне поле порожнє — виведіть попередження (alert або текст на сторінці)
  і скасуйте відправку форми (event.preventDefault()).
  Якщо всі поля заповнені — виведіть дані користувача в alert.
  -->
  <form id="userForm">
    <label for="first_name">Ім'я</label>
    <input type="text" id="first_name" name="first_name">

    <label for="last_name">Прізвище</label>
    <input type="text" id="last_name" name="last_name">

    <label for="email_name">Email</label>
    <input type="email" id="email_name" name="email">

    <button type="submit">Відправити</button>
  </form>

  <div id="error-message" style="color: red; margin-top: 10px;"></div>

  <script>
    const form = document.getElementById('userForm');

    form.addEventListener('submit', function(event) {
      let firstName = document.getElementById('first_name').value.trim();
      let lastName = document.getElementById('last_name').value.trim();
      let email = document.getElementById('email_name').value.trim();
      let errorDiv = document.getElementById('error-message');

      if (!firstName || !lastName || !email) {
        event.preventDefault();

        errorDiv.textContent = "Помилка: Усі поля мають бути заповнені!";
        alert("Не всі поля заповнені");
      } else {
        errorDiv.textContent = "";
        alert(`Користувач: ${firstName} ${lastName}\nEmail: ${email}`);

        event.preventDefault();
      }
    });
  </script>
</body>
</html>
