  Завдання 1: Пріоритет завантаження скриптів У вас є два підключених файли.

  Відповідь аргументуйте одним реченням.
  -->
  <script src="big.js"></script>
  <script src="small.js"></script>
  <!--
  Першим виконається big.js, оскільки стандартні скрипти виконуються суворо в тому порядку,
  в якому вони розташовані в HTML-документі, незалежно від швидкості їхнього завантаження.
  -->
</body>
