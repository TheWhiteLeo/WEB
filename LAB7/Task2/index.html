<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <!--
    Завдання 2: Логіка та змінні
    Дайте відповідь, чому дорівнюватиме х у цьому прикладі: var a = 2; var x = 1 + (a *= 2);
    -->
    <script>
        var a = 2;
        var x = 1 + (a *= 2);
        console.log(x);
    </script>
    <!-- Як можна побачити із консолі, JS дозволяє такий синтаксис, тому x = 5 -->

    <!--
    Чи з'явиться alert у наступному коді та поясніть чому?
    if ("0") { alert('Привіт'); }
    -->
    <script>
        if ("0") { alert('Привіт'); }
    </script>
    <!-- З'явиться, оскільки рядок "0" не порожній, а отже сприймається як істина -->

    <!--
    Оголосіть змінні admin та name, запишіть у name рядок "Василь",
    скопіюйте його в admin та виведіть admin у консоль.
    -->
    <script>
        var admin;
        var name = "Василь";
        admin = name;
        console.log(admin);
    </script>
</body>
</html>
